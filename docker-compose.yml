services:
  # ==========================================
  # 1. POSTGRESQL 17 - Última versión estable
  # ==========================================
  db:
    image: postgres:17.4-alpine        # ← Actualizado: 17.4 (mejoras JSON, WAL)
    container_name: camera_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: camera_admin
      POSTGRES_PASSWORD: CamSecure2024!
      POSTGRES_DB: camera_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camera_admin -d camera_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Nuevo: Configuraciones optimizadas para 2026
    command: 
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "max_connections=200"

  # ==========================================
  # 2. REDIS 7.4 - Última versión estable
  # ==========================================
  redis:
    image: redis:7.4.2-alpine          # ← Actualizado: mejoras en ACL y streams
    container_name: camera_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: 
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==========================================
  # 3. BACKEND - Python 3.13.1
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # Nuevo: BuildKit para mejor performance
    container_name: camera_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://camera_admin:CamSecure2024!@db:5432/camera_monitor
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=true
      - PYTHONUNBUFFERED=1                # Nuevo: logs inmediatos
      - PYTHONDONTWRITEBYTECODE=1         # Nuevo: no .pyc en volumen
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Nuevo: Healthcheck más robusto
    healthcheck:
      # test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      # test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # 4. CELERY WORKER - Python 3.13.1
  # ==========================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: camera_worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://camera_admin:CamSecure2024!@db:5432/camera_monitor
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app  # ← NUEVO
    working_dir: /app     # ← NUEVO: forzar directorio de trabajo
    user: "appuser"       # ← NUEVO: especificar usuario explícito
    depends_on:
      - db
      - redis
      - backend
    command: >
      sh -c "cd /app && 
             python -c 'import celery_worker; print(celery_worker)' && 
             celery -A celery_worker:celery_app worker --loglevel=info --concurrency=4 -Q celery,monitoring"

  # ==========================================
  # 5. CELERY BEAT - Scheduler
  # ==========================================
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: camera_scheduler
    restart: unless-stopped
    # ← ELIMINADO volumes:       - ./celerybeat-schedule:/app/celerybeat-schedule:rw
    environment:
      - DATABASE_URL=postgresql+asyncpg://camera_admin:CamSecure2024!@db:5432/camera_monitor
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app  # ← NUEVO
    working_dir: /app     # ← NUEVO
    user: "appuser"       # ← NUEVO
    depends_on:
      - db
      - redis
      - celery_worker
    command: >
      sh -c "cd /app && 
             celery -A celery_worker:celery_app beat --loglevel=info"

  # ==========================================
  # 6. FRONTEND - Node 22 LTS (2026)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: camera_dashboard
    restart: unless-stopped
    ports:
      - "5173:5173"
    #volumes:
      #- ./frontend:/app
      #- /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development
    # Nuevo: Healthcheck para frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # 7. PGADMIN 9 (Opcional) - Actualizado
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4:9.13          # ← Actualizado: UI moderna, mejor dark mode
    container_name: camera_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cameramonitor.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  celerybeat-schedule: